name: Publish ngx-umami

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Angular library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@cacic-fct'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate and build package
        run: bun run prepublish:lib

      - name: Ensure dist package metadata
        working-directory: dist/ngx-umami
        run: |
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm pkg set repository.url=https://github.com/${{ github.repository }}.git

      - name: Publish package
        run: bun run publish:lib
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
