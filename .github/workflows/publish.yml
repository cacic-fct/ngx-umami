name: Publish ngx-umami

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ngx-umami-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Angular library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@cacic-fct'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package
        run: bun run prepublish:lib

      - name: Configure package for GitHub Packages
        working-directory: dist/ngx-umami
        run: |
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm pkg set repository.url=https://github.com/${{ github.repository }}.git

      - name: Publish package
        run: bun run publish:lib
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
