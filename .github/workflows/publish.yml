name: Publish Angular library

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-angular-lib-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@cacic-fct'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bunx ng build ngx-umami --configuration production

      - name: Ensure package targets GitHub Packages
        working-directory: dist/ngx-umami
        run: |
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm pkg set repository.url=https://github.com/${{ github.repository }}.git

      - name: Publish to GitHub Packages
        working-directory: dist/ngx-umami
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
